<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst | Premium Leather Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }
        body {
            background-color: #f9f6f0;
            color: #333;
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Premium Navigation Bar for Your Beautiful Logo */
        .navbar {
            background-color: #111111; /* Dark theme to match your logo background */
            padding: 10px 0;
            border-bottom: 2px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-container a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .logo-container img {
            height: 65px; /* Perfect height to make the logo text readable */
            width: auto;
            display: block;
            border-radius: 4px;
        }
        .logo-text {
            color: #d4af37;
            font-size: 1.8rem;
            font-weight: 700;
        }
        /* Hero Section */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero-bg.jpg') no-repeat center center/cover;

            color: #fff;
            text-align: center;
            padding: 80px 20px;
        }
        header h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #d4af37;
        }
        header p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            display: inline-block;
            background-color: #d4af37;
            color: #1a1105;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: 0.3s;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #fff;
            color: #1a1105;
        }
        .features {
            background-color: #1a1105;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        .features-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .feature-item {
            margin: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4af37;
        }
        .products {
            padding: 60px 0;
            text-align: center;
        }
        .section-title {
            font-size: 2rem;
            margin-bottom: 40px;
            position: relative;
            color: #1a1105;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: #d4af37;
            margin: 10px auto 0;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #ddd;
        }
        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #1a1105;
        }
        .product-price {
            font-size: 1.2rem;
            color: #b8860b;
            font-weight: bold;
            margin-bottom: 15px;
        }
