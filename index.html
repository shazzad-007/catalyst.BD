<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATALYST | Luxury Fashion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body { font-family: sans-serif; margin: 0; background: var(--black); color: white; scroll-behavior: smooth; padding-bottom: 80px; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); position: fixed; width: 90%; top: 0; z-index: 1000; }
        .logo img { height: 40px; }

        .hero { height: 70vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('b0610130.jpg') no-repeat center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-top: 60px; }
        .shop-btn { margin-top: 20px; padding: 12px 30px; background: var(--gold); color: black; text-decoration: none; font-weight: bold; border-radius: 5px; }

        .products-container { padding: 40px 5%; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .product-card img { width: 100%; border-radius: 5px; }
        .add-to-cart { display: block; margin-top: 10px; padding: 10px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; }

        /* পেমেন্ট সেকশন যেখানে বিকাশ-নগদ লোগো থাকবে */
        .payment-info { background: #111; padding: 30px; text-align: center; border-top: 1px solid var(--gold); }
        .payment-logos img { height: 35px; background: white; padding: 5px; border-radius: 5px; margin: 5px; vertical-align: middle; }

        /* নিচের ফিক্সড কন্টাক্ট বার যেখানে সোশ্যাল লোগো থাকবে */
        .fixed-contact { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--gold); z-index: 2000; }
        .contact-item { text-decoration: none; color: white; font-size: 13px; text-align: center; }
        .contact-item i { display: block; font-size: 22px; margin-bottom: 5px; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="24463.jpeg" alt="Logo"></div>
    <a href="https://www.facebook.com/share/18XTpeWwFa/" target="_blank" style="color:var(--gold); text-decoration:none;">ফেসবুক পেজ</a>
</nav>

<div class="hero">
    <h1>CATALYST</h1>
    <a href="#shop" class="shop-btn">SHOP NOW</a>
</div>

<div id="shop" class="products-container">
    <h2 style="color: var(--gold);">আমাদের কালেকশন</h2>
    <div class="product-grid">
        <div class="product-card"><img src="shoe.jpeg"><h4>Premium Shoes</h4><p>৳ ৩,৫০০</p><a href="https://wa.me/8801818818886" class="add-to-cart">অর্ডার করুন</a></div>
        <div class="product-card"><img src="bag.jpeg"><h4>Luxury Bag</h4><p>৳ ৫,২০০</p><a href="https://wa.me/8801818818886" class="add-to-cart">অর্ডার করুন</a></div>
    </div>
</div>

<div class="payment-info">
    <h3 style="color:var(--gold);">পেমেন্ট পদ্ধতি</h3>
    <div class="payment-info">
    <h3 style="color:var(--gold);">পেমেন্ট পদ্ধতি</h3>
    <div class="payment-logos">
        <img src="https://www.logo.wine/a/logo/BKash/BKash-Logo.wine.svg" alt="bKash">
        
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8b/Nagad_Logo.svg/1200px-Nagad_Logo.svg.png" alt="Nagad">
    </div>
    <p>বিকাশ/নগদ (পার্সোনাল): 01670787453</p>
    <p>অর্ডার কনফার্ম করতে পণ্যের স্ক্রিনশট দিয়ে হোয়াটসঅ্যাপ করুন।</p>
</div>
